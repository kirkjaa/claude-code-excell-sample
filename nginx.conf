server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index Claude\ Cowork\ Excel\ -\ Sales\ Material.html;

    location / {
        try_files $uri $uri/ /Claude\ Cowork\ Excel\ -\ Sales\ Material.html;
    }

    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;
}
