services:
  claude-cowork-retail-sales:
    build: .
    container_name: claude-cowork-retail-sales
    ports:
      - "4008:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
