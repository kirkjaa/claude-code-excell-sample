services:
  claude-cowork-retail-sales:
    build: .
    container_name: claude-cowork-retail-sales
    ports:
      - "4008:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
